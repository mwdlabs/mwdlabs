<svg width="680" height="400" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
<!-- Background -->
<rect width="680" height="400" fill="white"/>

<!-- Background glow -->
<circle cx="340" cy="150" r="120" fill="#E24B4A" opacity=".04"/>
<circle cx="340" cy="150" r="80" fill="#E24B4A" opacity=".06"/>

<!-- Main mark -->
<g transform="translate(340,148)">

<!-- Outer frame diamond -->
<rect x="-68" y="-68" width="136" height="136" rx="4" transform="rotate(45)" fill="none" stroke="#E24B4A" stroke-width="1.8" opacity=".2"/>

<!-- Inner diamond -->
<rect x="-48" y="-48" width="96" height="96" rx="3" transform="rotate(45)" fill="#E24B4A" fill-opacity=".06" stroke="#E24B4A" stroke-width="0.8" opacity=".35"/>

<!-- Neural M pathways -->
<line x1="-38" y1="44" x2="-38" y2="-44" stroke="#E24B4A" stroke-width="3" stroke-linecap="round"/>
<line x1="-38" y1="-44" x2="0" y2="14" stroke="#E24B4A" stroke-width="3" stroke-linecap="round"/>
<line x1="0" y1="14" x2="38" y2="-44" stroke="#E24B4A" stroke-width="3" stroke-linecap="round"/>
<line x1="38" y1="-44" x2="38" y2="44" stroke="#E24B4A" stroke-width="3" stroke-linecap="round"/>

<!-- Cross-connections -->
<line x1="-38" y1="0" x2="0" y2="-16" stroke="#F09595" stroke-width="1" stroke-linecap="round" opacity=".5"/>
<line x1="0" y1="-16" x2="38" y2="0" stroke="#F09595" stroke-width="1" stroke-linecap="round" opacity=".5"/>
<line x1="-38" y1="-22" x2="38" y2="-22" stroke="#F09595" stroke-width="0.6" stroke-linecap="round" stroke-dasharray="2 4" opacity=".3"/>
<line x1="-38" y1="22" x2="38" y2="22" stroke="#F09595" stroke-width="0.6" stroke-linecap="round" stroke-dasharray="2 4" opacity=".3"/>

<!-- Primary nodes -->
<circle cx="-38" cy="-44" r="5.5" fill="#E24B4A"/>
<circle cx="-38" cy="-44" r="2.5" fill="#FCEBEB"/>
<circle cx="0" cy="14" r="5.5" fill="#E24B4A"/>
<circle cx="0" cy="14" r="2.5" fill="#FCEBEB"/>
<circle cx="38" cy="-44" r="5.5" fill="#E24B4A"/>
<circle cx="38" cy="-44" r="2.5" fill="#FCEBEB"/>
<circle cx="-38" cy="44" r="5.5" fill="#A32D2D"/>
<circle cx="-38" cy="44" r="2.5" fill="#F09595"/>
<circle cx="38" cy="44" r="5.5" fill="#A32D2D"/>
<circle cx="38" cy="44" r="2.5" fill="#F09595"/>

<!-- Secondary nodes -->
<circle cx="-38" cy="0" r="3" fill="#E24B4A" opacity=".6"/>
<circle cx="38" cy="0" r="3" fill="#E24B4A" opacity=".6"/>
<circle cx="0" cy="-16" r="3" fill="#E24B4A" opacity=".6"/>
<circle cx="-38" cy="22" r="2" fill="#E24B4A" opacity=".35"/>
<circle cx="38" cy="22" r="2" fill="#E24B4A" opacity=".35"/>
<circle cx="-38" cy="-22" r="2" fill="#E24B4A" opacity=".35"/>
<circle cx="38" cy="-22" r="2" fill="#E24B4A" opacity=".35"/>

<!-- Pulse rings -->
<circle cx="0" cy="14" r="10" fill="none" stroke="#E24B4A" stroke-width="0.5" opacity=".2"/>
<circle cx="-38" cy="-44" r="10" fill="none" stroke="#E24B4A" stroke-width="0.5" opacity=".15"/>
<circle cx="38" cy="-44" r="10" fill="none" stroke="#E24B4A" stroke-width="0.5" opacity=".15"/>

<!-- Floating particles -->
<circle cx="-62" cy="-20" r="1.5" fill="#E24B4A" opacity=".4"/>
<circle cx="65" cy="-30" r="1.5" fill="#E24B4A" opacity=".4"/>
<circle cx="-55" cy="50" r="1.2" fill="#E24B4A" opacity=".3"/>
<circle cx="58" cy="55" r="1.2" fill="#E24B4A" opacity=".3"/>
<circle cx="0" cy="-70" r="1.5" fill="#E24B4A" opacity=".35"/>
<circle cx="-70" cy="30" r="1" fill="#F09595" opacity=".3"/>
<circle cx="72" cy="18" r="1" fill="#F09595" opacity=".3"/>
</g>

<!-- Brand name -->
<text x="340" y="280" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="600" fill="#1a1a1a" letter-spacing="10">MWD</text>

<!-- LABS in red -->
<text x="340" y="310" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#E24B4A" letter-spacing="14">LABS</text>

<!-- Accent line -->

<!-- Tagline -->

<!-- Accent dots -->

<!-- Bottom services -->

</svg>
